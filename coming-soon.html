<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | FlowlaPo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --dark-bg: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.15) 0%, transparent 40%);
            background-color: var(--dark-bg);
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(20%) brightness(0.8);
        }

        /* Floating Poi Elements */
        .poi-element {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }

        .poi-1 {
            background: var(--neon-cyan);
            top: 10%;
            left: 10%;
        }

        .poi-2 {
            background: var(--neon-magenta);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Glass Content Box */
        .content-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 4rem;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--neon-cyan);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .coming-soon-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .socials {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .social-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: var(--neon-cyan);
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .content-box { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <!-- We use the assets image if it exists, otherwise the gradient fallback handles it -->
        <img src="assets/hero_motion_blur.png" alt="" class="bg-image" onerror="this.style.display='none'">
        <div class="poi-element poi-1"></div>
        <div class="poi-element poi-2"></div>
    </div>

    <div class="content-box">
        <div class="logo">Flow<span>laPo</span></div>
        <div class="coming-soon-badge">Coming Soon</div>
        <h1>Urban Flow.<br>Redefined.</h1>
        <p>We're crafting the ultimate modular poi experience for the modern nomadic artist. The wait is almost over.</p>
        
        <div class="socials">
            <a href="https://www.instagram.com/flowlapo_?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" class="social-link" target="_blank">Instagram</a>
            <a href="https://youtube.com/@flowlapo?si=hyhiKudmzT-W1KBS" class="social-link" target="_blank">YouTube</a>
        </div>
    </div>
</body>
</html>
